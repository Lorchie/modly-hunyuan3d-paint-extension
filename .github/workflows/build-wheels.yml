name: Build Wheels

# Triggered manually or when a release is published.
# Builds precompiled wheels for:
#   - mesh_processor   (differentiable_renderer, pybind11, no CUDA)
#   - custom_rasterizer (CUDA + PyTorch, multiple torch/cuda combos)
# All wheels are committed to wheels/ and attached to the GitHub release.

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

# ---------------------------------------------------------------------------
# Helpers: Python extraction scripts (reused by both jobs via shell: python)
# ---------------------------------------------------------------------------

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # Job 1 — mesh_processor (pybind11 C++, no CUDA required)
  # ─────────────────────────────────────────────────────────────────────────
  build-mesh-processor:
    name: mesh_processor | ${{ matrix.os }} | py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install build dependencies
        run: pip install "pybind11>=2.6.0" setuptools wheel

      - name: Extract differentiable_renderer source
        shell: python
        run: |
          import urllib.request, zipfile, io, pathlib
          URL    = "https://github.com/Tencent-Hunyuan/Hunyuan3D-2/archive/refs/heads/main.zip"
          PREFIX = "Hunyuan3D-2-main/hy3dgen/texgen/differentiable_renderer/"
          STRIP  = "Hunyuan3D-2-main/"
          print(f"Downloading {URL} ...")
          with urllib.request.urlopen(URL, timeout=300) as r:
              data = r.read()
          print("Extracting differentiable_renderer/ ...")
          with zipfile.ZipFile(io.BytesIO(data)) as zf:
              for m in zf.namelist():
                  if not m.startswith(PREFIX):
                      continue
                  rel = pathlib.Path(m[len(STRIP):])
                  if m.endswith("/"):
                      rel.mkdir(parents=True, exist_ok=True)
                  else:
                      rel.parent.mkdir(parents=True, exist_ok=True)
                      rel.write_bytes(zf.read(m))
          print("Done.")

      - name: Build wheel
        run: pip wheel hy3dgen/texgen/differentiable_renderer --no-deps -w dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mesh-processor-${{ matrix.os }}-py${{ matrix.python }}
          path: dist/*.whl

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2 — custom_rasterizer (CUDA extension, torch-version-tagged wheels)
  # ─────────────────────────────────────────────────────────────────────────
  build-custom-rasterizer:
    name: custom_rasterizer | ${{ matrix.os }} | py${{ matrix.python }} | ${{ matrix.torch.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python: ['3.10', '3.11', '3.12']
        torch:
          - label:  torch260-cuda124
            pkg:    "torch==2.6.0 torchvision==0.21.0"
            index:  "https://download.pytorch.org/whl/cu124"
            cuda:   "12.4.1"
          - label:  torch270-cuda128
            pkg:    "torch==2.7.0 torchvision==0.22.0"
            index:  "https://download.pytorch.org/whl/cu128"
            cuda:   "12.8.0"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # Install CUDA toolkit so nvcc is available for compilation
      - name: Install CUDA ${{ matrix.torch.cuda }}
        uses: Jimver/cuda-toolkit@v0.2.23
        with:
          cuda: ${{ matrix.torch.cuda }}
          method: network
          linux-local-args: '["--toolkit"]'

      - name: Install PyTorch
        run: pip install ${{ matrix.torch.pkg }} --index-url ${{ matrix.torch.index }}

      - name: Install build dependencies
        run: pip install setuptools wheel ninja

      - name: Extract custom_rasterizer source
        shell: python
        run: |
          import urllib.request, zipfile, io, pathlib
          URL    = "https://github.com/Tencent-Hunyuan/Hunyuan3D-2/archive/refs/heads/main.zip"
          PREFIX = "Hunyuan3D-2-main/hy3dgen/texgen/custom_rasterizer/"
          STRIP  = "Hunyuan3D-2-main/"
          print(f"Downloading {URL} ...")
          with urllib.request.urlopen(URL, timeout=300) as r:
              data = r.read()
          print("Extracting custom_rasterizer/ ...")
          with zipfile.ZipFile(io.BytesIO(data)) as zf:
              for m in zf.namelist():
                  if not m.startswith(PREFIX):
                      continue
                  rel = pathlib.Path(m[len(STRIP):])
                  if m.endswith("/"):
                      rel.mkdir(parents=True, exist_ok=True)
                  else:
                      rel.parent.mkdir(parents=True, exist_ok=True)
                      rel.write_bytes(zf.read(m))
          print("Done.")

      - name: Build wheel
        run: pip wheel hy3dgen/texgen/custom_rasterizer --no-deps -w raw-dist/

      # Rename wheel to include torch+cuda tag in the version field
      # e.g. custom_rasterizer-0.1-cp311-cp311-win_amd64.whl
      #   -> custom_rasterizer-0.1.0+torch270.cuda128-cp311-cp311-win_amd64.whl
      - name: Tag wheel with torch+cuda version
        shell: python
        run: |
          import pathlib, shutil, re, sys
          label = "${{ matrix.torch.label }}"
          src   = pathlib.Path("raw-dist")
          dst   = pathlib.Path("dist")
          dst.mkdir(exist_ok=True)
          for whl in src.glob("*.whl"):
              # Insert +label after the version field (first segment separated by -)
              tagged = re.sub(
                  r'^(custom_rasterizer-[^-]+)(-)',
                  lambda m: f"{m.group(1)}.0+{label}{m.group(2)}",
                  whl.name,
                  count=1,
              )
              shutil.copy(whl, dst / tagged)
              print(f"  {whl.name} -> {tagged}")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-rasterizer-${{ matrix.os }}-py${{ matrix.python }}-${{ matrix.torch.label }}
          path: dist/*.whl

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3 — Collect all wheels, commit to wheels/, attach to release
  # ─────────────────────────────────────────────────────────────────────────
  collect-wheels:
    name: Collect & publish wheels
    needs: [build-mesh-processor, build-custom-rasterizer]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts
          merge-multiple: true

      - name: Organize into wheels/
        run: |
          mkdir -p wheels
          find _artifacts -name '*.whl' -exec cp {} wheels/ \;
          echo "=== Wheels built ==="
          ls -1 wheels/

      - name: Commit wheels to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wheels/
          if git diff --staged --quiet; then
            echo "No wheel changes to commit."
          else
            git commit -m "ci: update prebuilt wheels [skip ci]"
            git push
          fi

      - name: Attach wheels to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: wheels/*.whl
